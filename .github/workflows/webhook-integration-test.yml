name: Orchestrator Test Workflow

# Temporary compatibility copy for local E2E validation while GitHub still indexes the workflow by its old path.

on:
  workflow_dispatch:
    inputs:
      workflowName:
        description: 'Workflow run name (format: functionappidentifier-instanceId)'
        required: true
        type: string
      localVerification:
        description: 'Optional local-only queue publication override JSON supplied by the local Functions dispatcher'
        required: false
        type: string

run-name: ${{ inputs.workflowName }}

permissions:
  contents: read

jobs:
  github-app-authz:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      authz-pipeline-envs: ${{ steps.authz.outputs.pipeline }}
      authz-primary-env: ${{ steps.authz.outputs.primary }}
      authz-authorized-target-envs: ${{ steps.authz.outputs.authorized-target-envs }}
      authz-installation-id: ${{ steps.authz.outputs.installation-id }}
    steps:
      - uses: actions/checkout@v4
      - id: authz
        uses: ./.github/actions/github-app-authz-envs
        with:
          gated-environments: |
            dev
            qa

  publish-inprogress:
    runs-on: ubuntu-latest
    needs: github-app-authz
    environment:
      name: ${{ needs.github-app-authz.outputs.authz-primary-env }}
    permissions:
      contents: read
      id-token: write
    outputs:
      authz-pipeline-envs: ${{ needs.github-app-authz.outputs.authz-pipeline-envs }}
      authz-primary-env: ${{ needs.github-app-authz.outputs.authz-primary-env }}
      authz-authorized-target-envs: ${{ needs.github-app-authz.outputs.authz-authorized-target-envs }}
      authz-installation-id: ${{ needs.github-app-authz.outputs.authz-installation-id }}
      published-in-progress: ${{ steps.publish.outputs.published }}
    steps:
      - uses: actions/checkout@v4
      - id: publish
        uses: ./.github/actions/publish-github-workflow-event
        with:
          github-environment: ${{ needs.github-app-authz.outputs.authz-primary-env }}
          github-app-installation-id: ${{ needs.github-app-authz.outputs.authz-installation-id }}
          message-type: GithubWorkflowInProgress
          local-verification: ${{ inputs.localVerification }}
          queue-name: default-queue
          repository: ${{ github.repository }}
          run-attempt: ${{ github.run_attempt }}
          run-id: ${{ github.run_id }}
          workflow-name: ${{ inputs.workflowName }}

  dev-task:
    runs-on: ubuntu-latest
    needs: publish-inprogress
    if: contains(fromJSON(needs.publish-inprogress.outputs.authz-authorized-target-envs), 'dev')
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4
      - run: echo "Building workflow for ${{ inputs.workflowName }} in DEV environment"

  qa-auto-approve:
    runs-on: ubuntu-latest
    needs: publish-inprogress
    if: contains(fromJSON(needs.publish-inprogress.outputs.authz-authorized-target-envs), 'qa')
    steps:
      - name: Wait for deployment to be registered
        run: sleep 20

      - name: Auto-approve deployment
        uses: activescott/automate-environment-deployment-approval@10179fc61443cb28b95e807814d9dfce60a9e230 # <- v1.1.0
        with:
          github_token: ${{ secrets.AUTO_APPROVE_DEPLOYMENTS_TOKEN }}
          environment_allow_list: qa
          run_id_allow_list: ${{ github.run_id }}

  qa-task:
    runs-on: ubuntu-latest
    needs: publish-inprogress
    if: contains(fromJSON(needs.publish-inprogress.outputs.authz-authorized-target-envs), 'qa')
    environment:
      name: qa
    steps:
      - uses: actions/checkout@v4
      - run: echo "Building workflow for ${{ inputs.workflowName }} in QA environment"

  publish-completed:
    runs-on: ubuntu-latest
    needs:
      - publish-inprogress
      - dev-task
      - qa-auto-approve
      - qa-task
    if: ${{ always() && needs.publish-inprogress.outputs.published-in-progress == 'true' }}
    environment:
      name: ${{ needs.publish-inprogress.outputs.authz-primary-env }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish completed queue message
        uses: ./.github/actions/publish-github-workflow-event
        with:
          github-environment: ${{ needs.publish-inprogress.outputs.authz-primary-env }}
          github-app-installation-id: ${{ needs.publish-inprogress.outputs.authz-installation-id }}
          message-type: GithubWorkflowCompleted
          local-verification: ${{ inputs.localVerification }}
          needs-json: ${{ toJSON(needs) }}
          queue-name: default-queue
          repository: ${{ github.repository }}
          run-attempt: ${{ github.run_attempt }}
          run-id: ${{ github.run_id }}
          workflow-name: ${{ inputs.workflowName }}